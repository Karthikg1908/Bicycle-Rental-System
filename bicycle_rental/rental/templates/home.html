<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Rental System</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background: linear-gradient(135deg,#dbeafe,#bfdbfe);
            text-align:center;
            padding-top:120px;
        }

        .container{
            width:70%;
            margin:auto;
            background:white;
            padding:50px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
        }

        h1{
            font-size:50px;
            color:#2563eb;
        }

        p{
            font-size:22px;
            color:#444;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:15px 35px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:12px;
            font-size:18px;
        }

        .btn:hover{
            background:#1d4ed8;
        }
    </style>

</head>
<body>

<div class="container">
    <h1>🚲 Bicycle Rental System</h1>

    <p>
        Welcome to the Bicycle Rental System built using Python and Django.
    </p>

    <p>
        Rent bicycles easily, check availability and manage rentals.
    </p>

    <a href="#" class="btn">
        Explore Rentals
    </a>
</div>

</body>
</html>
